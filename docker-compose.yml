services:
  postgres:
    image: postgres:16-alpine
    container_name: learnspace_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-learnspace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - learnspace_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learnspace_api
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${DB_NAME:-learnspace};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-LearnSpace}
      - Jwt__Audience=${JWT_AUDIENCE:-LearnSpaceUsers}
      - Jwt__ExpiryMinutes=${JWT_EXPIRY_MINUTES:-60}
      - Email__SmtpHost=${EMAIL_SMTP_HOST}
      - Email__Port=${EMAIL_PORT}
      - Email__ApiKey=${EMAIL_API_KEY}
      - Email__FromAddress=${EMAIL_FROM_ADDRESS}
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "80:80"
    depends_on:
      - postgres
    networks:
      - learnspace_network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: learnspace_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - learnspace_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  learnspace_network:
    driver: bridge
